<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>联系我们 | WEIYI 唯意</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>


  <!-- ============================================================
    导航栏
    注意：当前页为"联系我们"，因此 contact.html 的链接保留 class="active"
    其余页面的 <a> 标签不加 active
  ============================================================ -->
  <header class="nav">

    <!-- 品牌 Logo -->
    <div class="nav-logo">WEIYI <em>唯意</em></div>

    <!-- 导航链接组 -->
    <nav class="nav-links">
      <a href="index.html">首页</a>
      <a href="about.html">品牌故事</a>
      <a href="products.html">产品展示</a>
      <a href="contact.html" class="active">联系我们</a>
    </nav>

  </header>


  <main>


    <!-- ============================================================
      页面顶部横幅
      修改页面标题：修改 <h2> 内的文字
      修改背景颜色：在 style.css 的 .page-banner 里修改 background
      修改横幅高度：在 style.css 的 .page-banner 里修改 height
    ============================================================ -->
    <div class="page-banner">
      <h2>联系我们</h2>
    </div>


    <!-- ============================================================
      联系页主体：左右双栏布局
      左栏：联系方式信息展示
      右栏：留言表单
      修改布局比例：在 style.css 的 .contact-section 里修改
                    grid-template-columns，例如改为 2fr 3fr
                    可让右侧表单区更宽
    ============================================================ -->
    <div class="contact-section">


      <!-- ============================================================
        左栏：联系方式
        新增联系方式：复制一个完整的 contact-info-item 块并修改内容
        修改联系内容：修改各 contact-info-item 内的 <p> 文字
        新增社交平台：在 contact-social 里复制一个 <a> 标签并修改
      ============================================================ -->
      <div class="contact-info">

        <!-- 左栏标题 -->
        <h3>联系方式</h3>

        <!-- 联系方式：微信 -->
        <div class="contact-info-item">
          <!-- 标签文字，修改为对应平台名称 -->
          <label>微信</label>
          <!-- 替换为真实微信号 -->
          <p>weiyi_official</p>
        </div>

        <!-- 联系方式：邮箱 -->
        <div class="contact-info-item">
          <label>邮箱</label>
          <!-- 替换为真实邮箱地址 -->
          <p>contact@weiyi.com</p>
        </div>

        <!-- 联系方式：小红书 -->
        <div class="contact-info-item">
          <label>小红书</label>
          <!-- 替换为真实小红书账号信息 -->
          <p>WEIYI 唯意 · 小红书号 5378342973</p>
        </div>

        <!-- 联系方式：IP 属地 -->
        <div class="contact-info-item">
          <label>IP 属地</label>
          <p>广东</p>
        </div>

        <!-- 新增联系方式：复制上方一个 contact-info-item 粘贴到此处 -->

        <!-- 社交媒体跳转链接区 -->
        <div class="contact-social">

          <!-- 小红书跳转链接，修改 href 为真实链接 -->
          <a href="https://www.xiaohongshu.com/user/profile/63bbd09d00000000260107a7"
             target="_blank">
            小红书主页 →
          </a>

          <!-- 新增平台链接：复制上方 <a> 标签粘贴到此处并修改 -->

        </div>

      </div>


      <!-- ============================================================
        右栏：留言表单
        新增表单字段：复制一个完整的 form-field 块并修改
        修改字段标签：修改 <label> 内的文字
        修改占位文字：修改 input 或 textarea 的 placeholder 属性
        注意：此表单为静态展示，提交按钮点击后无实际后台处理
              如需真实提交功能，需对接后端服务或第三方表单服务
      ============================================================ -->
     <!-- 右栏：留言表单 -->
<div class="contact-form">
  <h3>留言咨询(点击提交后自动跳转至邮箱)</h3>

  <div class="form-field">
    <label>您的姓名</label>
    <input type="text" id="contactName" placeholder="请输入姓名" />
  </div>

  <div class="form-field">
    <label>联系方式</label>
    <input type="text" id="contactInfo" placeholder="微信 / 手机 / 邮箱" />
  </div>

  <div class="form-field">
    <label>留言内容</label>
    <textarea id="contactMessage" placeholder="请输入您的留言..."></textarea>
  </div>

  <button class="form-submit" type="button" id="mailToBtn">提交留言</button>
  </div>

<script>
  document.getElementById('mailToBtn').addEventListener('click', function () {
    var name = document.getElementById('contactName').value.trim();
    var contact = document.getElementById('contactInfo').value.trim();
    var message = document.getElementById('contactMessage').value.trim();

    if (!name || !contact || !message) {
      alert('请完整填写姓名、联系方式和留言内容。');
      return;
    }

    var subject = 'WEIYI 官网留言';
    var body =
      '姓名：' + name + '\n' +
      '联系方式：' + contact + '\n' +
      '留言内容：\n' + message + '\n';

    var mailtoLink =
      'mailto:contact@weiyi.com' +
      '?subject=' + encodeURIComponent(subject) +
      '&body=' + encodeURIComponent(body);

    window.location.href = mailtoLink;
  });
</script>



  <!-- ============================================================
    页脚
    修改版权年份：修改 © 后面的年份
    修改联系方式：修改最后一个 <div> 内的文字
  ============================================================ -->
  <footer class="footer">
    <div class="footer-logo">WEIYI 唯意</div>
    <div>© 2024 WEIYI 唯意 · 保留所有权利</div>
    <!-- 替换为真实联系方式 -->
    <div>contact@weiyi.com</div>
  </footer>


</body>
</html>
