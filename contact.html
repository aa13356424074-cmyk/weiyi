      <div class="contact-info">

<div class="contact-form">
  <h3>留言咨询(点击提交后自动跳转至邮箱)</h3>

  <div class="form-field">
    <label>您的姓名</label>
    <input type="text" id="contactName" placeholder="请输入姓名" />
  </div>

  <div class="form-field">
    <label>联系方式</label>
    <input type="text" id="contactInfo" placeholder="微信 / 手机 / 邮箱" />
  </div>

  <div class="form-field">
    <label>留言内容</label>
    <textarea id="contactMessage" placeholder="请输入您的留言..."></textarea>
  </div>

  <button class="form-submit" type="button" id="mailToBtn">提交留言</button>
  </div>

<script>
  document.getElementById('mailToBtn').addEventListener('click', function () {
    var name = document.getElementById('contactName').value.trim();
    var contact = document.getElementById('contactInfo').value.trim();
    var message = document.getElementById('contactMessage').value.trim();

    if (!name || !contact || !message) {
      alert('请完整填写姓名、联系方式和留言内容。');
      return;
    }

    var subject = 'WEIYI 官网留言';
    var body =
      '姓名：' + name + '\n' +
      '联系方式：' + contact + '\n' +
      '留言内容：\n' + message + '\n';

    var mailtoLink =
      'mailto:contact@weiyi.com' +
      '?subject=' + encodeURIComponent(subject) +
      '&body=' + encodeURIComponent(body);

    window.location.href = mailtoLink;
  });
</script>
